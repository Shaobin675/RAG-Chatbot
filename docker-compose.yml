version: "3.9"

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: GET_YOUR_OWN
      POSTGRES_DB: chatdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:8-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  chat-orchestrator:
    build:
      context: ./chat-orchestrator
      dockerfile: Dockerfile
    environment:
      - POSTGRES_DSN=postgresql://postgres:GET_YOUR_OWN@postgres:5432/chatdb
      - REDIS_URL=redis://redis:6379/0
      - LANGGRAPH_SERVICE_URL=http://langgraph-service:8001
      - API_KEY=GET_YOUR_OWN
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - langgraph-service

  langgraph-service:
    build:
      context: ./langgraph-service
      dockerfile: Dockerfile
    environment:
      - LANGGRAPH_API_KEY=GET_YOUR_OWN
      - OUTBOUND_API_KEY=GET_YOUR_OWN
      - RAG_SERVICE_URL=http://rag-service:8002
      - EMBEDDING_SERVICE_URL=http://embedding-service:8003
    ports:
      - "8001:8001"
    depends_on:
      - rag-service
      - embedding-service

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    environment:
      - API_KEY=changeme123
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENV=${PINECONE_ENV}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
    ports:
      - "8002:8002"
    depends_on:
      - redis

  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    environment:
      - API_KEY=GET_YOUR_OWN
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8003:8003"

  upload-service:
    build: ./upload-service
    depends_on:
      - postgres
      - kafka

  ingestion-worker:
    build: ./ingestion-worker
    depends_on:
      - kafka
      - postgres

  # ── Temporal dependencies ──────────────────────────────────────────────────

  temporal-db:
    image: postgres:18
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    networks:
      - rag-network

  temporal:
    image: temporalio/auto-setup:1.24
    depends_on:
      - temporal-db
    environment:
      DB: postgres18
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
    ports:
      - "7233:7233"   # gRPC frontend (workers + clients connect here)
    networks:
      - rag-network

  temporal-ui:
    image: temporalio/ui:2.26
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"   # Temporal Web UI — workflow visibility dashboard
    networks:
      - rag-network

  # ── Temporal ingestion worker ──────────────────────────────────────────────

  temporal-worker:
    build:
      context: ./temporal-worker
      dockerfile: Dockerfile
    depends_on:
      - temporal
      - redis
    environment:
      TEMPORAL_HOST: temporal:7233
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    volumes:
      - faiss-data:/data/faiss_index
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  temporal-db-data:
  faiss-data:

networks:
  rag-network:
    external: true  
        
volumes:
  - pgdata:/var/lib/postgresql/data
  - redisdata:/data
